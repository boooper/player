name: publish

on:
  push:
    branches:
      - main
      - release
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            sidecar-script: sidecar:build:win

          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            sidecar-script: sidecar:build:mac-arm

          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            sidecar-script: sidecar:build:mac-x64

          - platform: ubuntu-22.04
            args: ''
            sidecar-script: sidecar:build:linux

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Build API sidecar
        run: npm run ${{ matrix.sidecar-script }} --workspace @player/api

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: app-v__VERSION__
          releaseName: 'Naviarr v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: --config src-tauri/tauri.build.conf.json --ci ${{ matrix.args }}

