name: Desktop

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar-script: sidecar:build:win

          - platform: macos-latest        # arm64 (M-series runner)
            target: aarch64-apple-darwin
            sidecar-script: sidecar:build:mac-arm

          - platform: macos-latest        # cross-compile x86_64 on ARM runner
            target: x86_64-apple-darwin
            sidecar-script: sidecar:build:mac-x64

          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar-script: sidecar:build:linux

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Build API sidecar
        run: npm run ${{ matrix.sidecar-script }} --workspace @player/api

      - name: Build desktop artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: --config src-tauri/tauri.build.conf.json --target ${{ matrix.target }} --ci
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: naviarr-[platform]-[arch]-[bundle]

      - name: Build and publish desktop release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Naviarr ${{ github.ref_name }}'
          releaseBody: 'See the workflow artifacts and release assets for this build.'
          releaseDraft: false
          prerelease: false
          args: --config src-tauri/tauri.build.conf.json --target ${{ matrix.target }} --ci
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: naviarr-[platform]-[arch]-[bundle]

