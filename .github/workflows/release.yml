name: publish

on:
  push:
    branches:
      - main
      - release
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: calculate next tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"

          if [[ -n "$latest_tag" ]]; then
            base="${latest_tag#v}"
          else
            base="$(python3 -c "import json; print(json.load(open('apps/desktop/package.json'))['version'])")"
          fi

          IFS='.' read -r major minor patch <<< "$base"
          version="${major}.${minor}.$((patch + 1))"
          tag="v${version}"

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  build-tauri:
    needs: prepare-release
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            artifact_name: "bundle-macos-aarch64"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            artifact_name: "bundle-macos-x64"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            artifact_name: "bundle-linux-x64"
            args: ""
          - platform: "windows-latest"
            artifact_name: "bundle-windows-x64"
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"

      - name: install frontend dependencies
        run: bun install

      - name: stamp release version
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]

          package_json = Path("apps/desktop/package.json")
          data = json.loads(package_json.read_text())
          data["version"] = version
          package_json.write_text(json.dumps(data, indent=2) + "\n")

          tauri_conf = Path("apps/desktop/src-tauri/tauri.conf.json")
          data = json.loads(tauri_conf.read_text())
          data["version"] = version
          tauri_conf.write_text(json.dumps(data, indent=2) + "\n")
          PY

      - name: stamp cargo version
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]
          cargo_toml = Path("apps/desktop/src-tauri/Cargo.toml")
          text = cargo_toml.read_text()
          text, count = re.subn(r'^version = ".*?"$', f'version = "{version}"', text, count=1, flags=re.MULTILINE)
          if count != 1:
            raise SystemExit("Failed to update Cargo.toml version")
          cargo_toml.write_text(text)
          PY

      - name: build
        run: bun run --cwd apps/desktop tauri build --config src-tauri/tauri.build.conf.json ${{ matrix.args }}

      - name: upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/**/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/**/*.app.tar.gz
            apps/desktop/src-tauri/target/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/release/bundle/**/*.rpm
            apps/desktop/src-tauri/target/*/release/bundle/**/*.AppImage
            apps/desktop/src-tauri/target/*/release/bundle/**/*.app.tar.gz
            apps/desktop/src-tauri/target/*/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/*/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/*/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/*/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/*/release/bundle/**/*.rpm
          if-no-files-found: error
          retention-days: 7

  draft-release:
    needs:
      - prepare-release
      - build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: download built bundles
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: bundle-*
          merge-multiple: false

      - name: create and push tag
        env:
          TAG_NAME: ${{ needs.prepare-release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists locally"
          else
            git tag "$TAG_NAME"
          fi

          if git ls-remote --tags origin "refs/tags/$TAG_NAME" | grep -q "$TAG_NAME"; then
            echo "Tag $TAG_NAME already exists on origin"
          else
            git push origin "$TAG_NAME"
          fi

      - name: publish draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.prepare-release.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            dist/**/*.AppImage
            dist/**/*.app.tar.gz
            dist/**/*.deb
            dist/**/*.dmg
            dist/**/*.exe
            dist/**/*.msi
            dist/**/*.rpm
